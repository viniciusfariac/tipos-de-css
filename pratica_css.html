<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<div class="card">

		<div class="foto">
			<img  src="https://cdn-icons-png.flaticon.com/512/706/706830.png" alt="Foto de uma mulher">

		</div>

		<div>
			<h1 class="card_title">
				Meu nome é: <span class="highlight_color">Adriana</span>
			</h1>

			<p>
				Mensagem: <span class="highlight_color">A vida não é um morango!</span>
			</p>
		</div>
	</div>

	<div class="card">

		<div class="foto">
			<img src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="Foto de um homem">
		</div>

		<div>
			<h1 class="card_title">
				Meu nome é: <span class="highlight_color">Hugo</span>
			</h1>

			<p>
				Mensagem: <span class="highlight_color">Um dia é da caça, o outro é do caçador.</span>
			</p>
		</div>
	</div>

</body>

</html>
